# Bug Report
```yaml
name: Bug Report
description: Report incorrect behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: repo
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Verison or commit SHA
  - type: textarea
    id: logs
    attriutes:
      label: Relevant logs
```
